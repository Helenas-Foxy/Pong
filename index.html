<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
    <title>Пинг-понг</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --field: #0d5e2e;
            --white: #f0f0f0;
            --btn-mobile: #2a2a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
            max-width: 800px;
            padding: 5px 10px;
        }

        #scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            color: var(--white);
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 0 2px;
        }

        #player-score,
        #ai-score {
            font-size: 36px;
            min-width: 40px;
            text-align: center;
            transition: transform 0.15s;
        }

        .score-pop {
            transform: scale(1.4);
            color: #ffd700;
        }

        #pause-btn {
            background: transparent;
            border: 2px solid var(--white);
            color: var(--white);
            padding: 5px 12px;
            font-size: 13px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
            letter-spacing: 1px;
            white-space: nowrap;
        }

        #pause-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        canvas {
            border: 3px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 100%;
            display: block;
        }

        #message {
            color: #ccc;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
            letter-spacing: 0.5px;
            padding: 0 5px;
        }

        #restart-btn {
            display: none;
            background: var(--white);
            color: var(--bg);
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            letter-spacing: 2px;
            transition: transform 0.1s;
        }

        #restart-btn:active {
            transform: scale(0.95);
        }

        /* ==================== МОБИЛЬНЫЕ КНОПКИ ==================== */
        #mobile-controls {
            display: none;
            width: 100%;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            padding: 0 5px;
        }

        #mobile-controls.visible {
            display: flex;
        }

        .mobile-btn {
            flex: 1;
            background: #2a2a4a;
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #ffffff;
            font-size: 26px;
            font-weight: bold;
            padding: 14px 0;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            min-height: 55px;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .mobile-btn:active {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffffff;
            transform: scale(0.95);
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
        }

        .btn-icon {
            font-size: 24px;
            line-height: 1;
        }

        #controls-hint {
            color: #777;
            font-size: 11px;
            text-align: center;
        }

        @media (pointer: coarse) {
            #mobile-controls {
                display: flex;
            }
            #controls-hint {
                display: none;
            }
        }

        @media (max-width: 768px) {
            #mobile-controls {
                display: flex;
            }
            #controls-hint {
                display: none;
            }
            #player-score,
            #ai-score {
                font-size: 28px;
                min-width: 30px;
            }
            #scoreboard {
                font-size: 14px;
            }
            #pause-btn {
                padding: 4px 10px;
                font-size: 11px;
            }
            #message {
                font-size: 12px;
            }
            .mobile-btn {
                font-size: 22px;
                padding: 12px 0;
                min-height: 48px;
                border-radius: 12px;
            }
            .btn-icon {
                font-size: 20px;
            }
        }

        @media (max-width: 400px) {
            .mobile-btn {
                font-size: 18px;
                padding: 10px 0;
                min-height: 42px;
                gap: 4px;
            }
            .btn-icon {
                font-size: 18px;
            }
            #player-score,
            #ai-score {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="scoreboard">
            <span>ВЫ</span>
            <span id="player-score">0</span>
            <button id="pause-btn" title="Пауза">⏯ ПАУЗА</button>
            <span id="ai-score">0</span>
            <span>AI</span>
        </div>

        <canvas id="game"></canvas>

        <div id="mobile-controls">
            <button class="mobile-btn btn-up" id="btn-up">
                <span class="btn-icon">▲</span> ВВЕРХ
            </button>
            <button class="mobile-btn btn-down" id="btn-down">
                <span class="btn-icon">▼</span> ВНИЗ
            </button>
        </div>

        <div id="message">Стрелки ↑↓ / касание левой половины</div>
        <button id="restart-btn">🔄 ИГРАТЬ СНОВА</button>
        <div id="controls-hint">Пробел — пауза | R — рестарт</div>
    </div>

    <script>
        (function() {
            // ==================== DOM-ЭЛЕМЕНТЫ ====================
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');
            const playerScoreEl = document.getElementById('player-score');
            const aiScoreEl = document.getElementById('ai-score');
            const messageEl = document.getElementById('message');
            const restartBtn = document.getElementById('restart-btn');
            const pauseBtn = document.getElementById('pause-btn');
            const btnUp = document.getElementById('btn-up');
            const btnDown = document.getElementById('btn-down');
            const mobileControls = document.getElementById('mobile-controls');
            const controlsHint = document.getElementById('controls-hint');

            // ==================== АУДИО ====================
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playTone(freq, duration, type = 'square', volume = 0.15) {
                if (!audioCtx) return;
                try {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.start(audioCtx.currentTime);
                    osc.stop(audioCtx.currentTime + duration);
                } catch (e) {}
            }

            function soundPaddleHit() {
                playTone(880, 0.08, 'square', 0.12);
                setTimeout(() => playTone(1100, 0.05, 'square', 0.08), 40);
            }

            function soundWallHit() {
                playTone(440, 0.1, 'triangle', 0.1);
            }

            function soundGoal() {
                playTone(180, 0.25, 'sawtooth', 0.2);
                setTimeout(() => playTone(120, 0.3, 'sawtooth', 0.15), 150);
            }

            function soundWin() {
                playTone(660, 0.12, 'square', 0.1);
                setTimeout(() => playTone(880, 0.12, 'square', 0.1), 120);
                setTimeout(() => playTone(1100, 0.2, 'square', 0.12), 240);
            }

            // ==================== КОНСТАНТЫ ====================
            const WIN_SCORE = 5;
            const FIELD_RATIO = 16 / 9;
            const BALL_SPEED = 6;

            // 🔧 УМЕНЬШЕНЫ В 2 РАЗА: было 3 → 1.5, было 10 → 5
            const MOBILE_PADDLE_MULTIPLIER = 1.5;
            const MOBILE_BALL_MULTIPLIER = 5;

            // ==================== ПЕРЕМЕННЫЕ ====================
            let gameWidth, gameHeight;
            let paddleWidth, paddleHeight;
            let ballSize;
            let isMobile = false;

            let playerY, aiY;
            let ballX, ballY;
            let ballSpeedX, ballSpeedY;

            let playerScore = 0;
            let aiScore = 0;
            let gameOver = false;
            let paused = false;
            let gameStarted = false;

            let particles = [];

            const keys = {};
            let touchActive = false;
            let touchY = 0;
            let btnUpPressed = false;
            let btnDownPressed = false;

            // ==================== ОПРЕДЕЛЕНИЕ УСТРОЙСТВА ====================
            function detectMobile() {
                const hasTouch = ('ontouchstart' in window) ||
                    (navigator.maxTouchPoints > 0) ||
                    (window.matchMedia('(pointer: coarse)').matches);
                const smallScreen = window.innerWidth <= 768;
                isMobile = hasTouch || smallScreen;

                if (mobileControls) {
                    if (isMobile) {
                        mobileControls.classList.add('visible');
                        mobileControls.style.display = 'flex';
                    } else {
                        mobileControls.classList.remove('visible');
                        mobileControls.style.display = 'none';
                    }
                }

                if (controlsHint) {
                    controlsHint.style.display = isMobile ? 'none' : 'block';
                }

                updateMessage();
            }

            function updateMessage() {
                if (gameOver) return;
                if (paused) {
                    messageEl.textContent = 'Игра на паузе';
                } else if (isMobile) {
                    messageEl.textContent = 'Кнопки ▼▲ или касание левой половины';
                } else {
                    messageEl.textContent = 'Стрелки ↑↓ / Пробел — пауза | R — рестарт';
                }
            }

            function updateSizes() {
                if (gameHeight <= 0) return;

                if (isMobile) {
                    paddleHeight = Math.round(gameHeight * 0.1 * MOBILE_PADDLE_MULTIPLIER);
                    ballSize = Math.round(gameHeight * 0.025 * MOBILE_BALL_MULTIPLIER);
                } else {
                    paddleHeight = Math.round(gameHeight * 0.1);
                    ballSize = Math.round(gameHeight * 0.025);
                }

                paddleHeight = Math.min(paddleHeight, Math.floor(gameHeight * 0.35));
                ballSize = Math.min(ballSize, Math.floor(gameHeight * 0.15));
                paddleHeight = Math.max(paddleHeight, 20);
                ballSize = Math.max(ballSize, 8);

                paddleWidth = Math.max(6, Math.round(gameWidth * 0.02));

                playerY = clamp(playerY, 0, gameHeight - paddleHeight);
                aiY = clamp(aiY, 0, gameHeight - paddleHeight);
            }

            function clamp(val, min, max) {
                return Math.max(min, Math.min(max, val));
            }

            function resize() {
                const maxWidth = Math.min(window.innerWidth - 16, 800);
                const maxHeight = isMobile ?
                    Math.min(window.innerHeight * 0.4, 350) :
                    Math.min(window.innerHeight * 0.55, 500);

                if (maxWidth / maxHeight > FIELD_RATIO) {
                    gameHeight = Math.floor(maxHeight);
                    gameWidth = Math.floor(gameHeight * FIELD_RATIO);
                } else {
                    gameWidth = Math.floor(maxWidth);
                    gameHeight = Math.floor(gameWidth / FIELD_RATIO);
                }

                canvas.width = gameWidth;
                canvas.height = gameHeight;
                updateSizes();

                if (!gameStarted && !gameOver) {
                    playerY = gameHeight / 2 - paddleHeight / 2;
                    aiY = gameHeight / 2 - paddleHeight / 2;
                }
                playerY = clamp(playerY, 0, gameHeight - paddleHeight);
                aiY = clamp(aiY, 0, gameHeight - paddleHeight);
            }

            function resetBall(direction = 1) {
                ballX = gameWidth / 2;
                ballY = gameHeight / 2;
                const angle = (Math.random() * Math.PI / 2) - Math.PI / 4;
                ballSpeedX = BALL_SPEED * Math.cos(angle) * direction;
                ballSpeedY = BALL_SPEED * Math.sin(angle);
            }

            function resetGame() {
                playerScore = 0;
                aiScore = 0;
                gameOver = false;
                paused = false;
                gameStarted = true;
                particles = [];
                updateScoreDisplay();
                restartBtn.style.display = 'none';
                pauseBtn.textContent = '⏯ ПАУЗА';
                playerScoreEl.classList.remove('score-pop');
                aiScoreEl.classList.remove('score-pop');
                updateMessage();
                playerY = gameHeight / 2 - paddleHeight / 2;
                aiY = gameHeight / 2 - paddleHeight / 2;
                resetBall(Math.random() > 0.5 ? 1 : -1);
            }

            function updateScoreDisplay() {
                playerScoreEl.textContent = playerScore;
                aiScoreEl.textContent = aiScore;
            }

            function popScore(el) {
                el.classList.add('score-pop');
                setTimeout(() => el.classList.remove('score-pop'), 200);
            }

            function spawnParticles(x, y) {
                const count = isMobile ? 16 : 12;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 4;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1.0,
                        decay: 0.03 + Math.random() * 0.04,
                        size: 2 + Math.random() * (isMobile ? 5 : 4),
                    });
                }
            }

            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.life <= 0) particles.splice(i, 1);
                }
            }

            function drawParticles() {
                for (const p of particles) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            function updateAI() {
                const aiSpeed = gameHeight * 0.012;
                const aiCenter = aiY + paddleHeight / 2;
                const ballCenter = ballY;
                if (ballSpeedX > 0) {
                    const targetOffset = (Math.sin(Date.now() / 800) * paddleHeight * 0.25);
                    const target = ballCenter + targetOffset;
                    if (aiCenter < target - 5) aiY += aiSpeed;
                    else if (aiCenter > target + 5) aiY -= aiSpeed;
                } else {
                    const center = gameHeight / 2;
                    if (aiCenter < center - 10) aiY += aiSpeed * 0.5;
                    else if (aiCenter > center + 10) aiY -= aiSpeed * 0.5;
                }
                aiY = clamp(aiY, 0, gameHeight - paddleHeight);
            }

            function update() {
                if (paused || gameOver) return;
                const playerSpeed = gameHeight * (isMobile ? 0.025 : 0.018);

                if (keys['ArrowUp'] || keys['ArrowDown'] || btnUpPressed || btnDownPressed) initAudio();
                if (keys['ArrowUp']) playerY -= playerSpeed;
                if (keys['ArrowDown']) playerY += playerSpeed;
                if (btnUpPressed) playerY -= playerSpeed;
                if (btnDownPressed) playerY += playerSpeed;
                playerY = clamp(playerY, 0, gameHeight - paddleHeight);

                updateAI();
                ballX += ballSpeedX;
                ballY += ballSpeedY;

                if (ballY - ballSize / 2 <= 0) {
                    ballY = ballSize / 2;
                    ballSpeedY = Math.abs(ballSpeedY);
                    soundWallHit();
                    spawnParticles(ballX, 0);
                }
                if (ballY + ballSize / 2 >= gameHeight) {
                    ballY = gameHeight - ballSize / 2;
                    ballSpeedY = -Math.abs(ballSpeedY);
                    soundWallHit();
                    spawnParticles(ballX, gameHeight);
                }

                if (
                    ballX - ballSize / 2 <= paddleWidth &&
                    ballY + ballSize / 2 >= playerY &&
                    ballY - ballSize / 2 <= playerY + paddleHeight &&
                    ballSpeedX < 0
                ) {
                    ballX = paddleWidth + ballSize / 2;
                    const hitPos = (ballY - (playerY + paddleHeight / 2)) / (paddleHeight / 2);
                    const angle = clamp(hitPos, -1, 1) * (Math.PI / 4);
                    ballSpeedX = BALL_SPEED * Math.cos(angle);
                    ballSpeedY = BALL_SPEED * Math.sin(angle);
                    soundPaddleHit();
                    spawnParticles(ballX, ballY);
                }

                if (
                    ballX + ballSize / 2 >= gameWidth - paddleWidth &&
                    ballY + ballSize / 2 >= aiY &&
                    ballY - ballSize / 2 <= aiY + paddleHeight &&
                    ballSpeedX > 0
                ) {
                    ballX = gameWidth - paddleWidth - ballSize / 2;
                    const hitPos = (ballY - (aiY + paddleHeight / 2)) / (paddleHeight / 2);
                    const angle = clamp(hitPos, -1, 1) * (Math.PI / 4);
                    ballSpeedX = -BALL_SPEED * Math.cos(angle);
                    ballSpeedY = BALL_SPEED * Math.sin(angle);
                    soundPaddleHit();
                    spawnParticles(ballX, ballY);
                }

                if (ballX + ballSize / 2 < 0) {
                    aiScore++;
                    updateScoreDisplay();
                    popScore(aiScoreEl);
                    soundGoal();
                    if (aiScore >= WIN_SCORE) endGame('AI');
                    else resetBall(1);
                }
                if (ballX - ballSize / 2 > gameWidth) {
                    playerScore++;
                    updateScoreDisplay();
                    popScore(playerScoreEl);
                    soundGoal();
                    if (playerScore >= WIN_SCORE) endGame('Игрок');
                    else resetBall(-1);
                }

                updateParticles();
            }

            function endGame(winner) {
                gameOver = true;
                messageEl.textContent = winner === 'Игрок' ? '🎉 ВЫ ПОБЕДИЛИ! 🎉' : '😞 AI победил...';
                if (winner === 'Игрок') soundWin();
                restartBtn.style.display = 'inline-block';
                pauseBtn.textContent = '⏯ ПАУЗА';
            }

            function draw() {
                ctx.clearRect(0, 0, gameWidth, gameHeight);
                ctx.fillStyle = '#0d5e2e';
                ctx.fillRect(0, 0, gameWidth, gameHeight);

                const gradient = ctx.createRadialGradient(
                    gameWidth / 2, gameHeight / 2, gameWidth * 0.4,
                    gameWidth / 2, gameHeight / 2, gameWidth * 0.9
                );
                gradient.addColorStop(0, 'rgba(0,0,0,0)');
                gradient.addColorStop(1, 'rgba(0,0,0,0.25)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, gameWidth, gameHeight);

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.lineWidth = Math.max(2, gameWidth * 0.004);
                ctx.setLineDash([gameHeight * 0.04, gameHeight * 0.04]);
                ctx.beginPath();
                ctx.moveTo(gameWidth / 2, 0);
                ctx.lineTo(gameWidth / 2, gameHeight);
                ctx.stroke();
                ctx.setLineDash([]);

                ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
                ctx.lineWidth = Math.max(2, gameWidth * 0.003);
                ctx.beginPath();
                ctx.arc(gameWidth / 2, gameHeight / 2, gameHeight * 0.12, 0, Math.PI * 2);
                ctx.stroke();

                ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(0, playerY, paddleWidth, paddleHeight);
                ctx.fillRect(gameWidth - paddleWidth, aiY, paddleWidth, paddleHeight);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = 'rgba(255, 255, 255, 0.7)';
                ctx.shadowBlur = isMobile ? 12 : 10;
                ctx.beginPath();
                ctx.arc(ballX, ballY, ballSize / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                drawParticles();

                if (paused && !gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, gameWidth, gameHeight);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `${Math.round(gameHeight * 0.1)}px "Segoe UI", Arial, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('ПАУЗА', gameWidth / 2, gameHeight / 2);
                    ctx.textAlign = 'start';
                }
            }

            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            window.addEventListener('keydown', (e) => {
                keys[e.key] = true;
                if (e.key === ' ' || e.code === 'Space') {
                    e.preventDefault();
                    if (!gameOver) { initAudio();
                        togglePause(); }
                }
                if (e.key === 'r' || e.key === 'R') {
                    e.preventDefault();
                    initAudio();
                    detectMobile();
                    resize();
                    resetGame();
                }
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault();
            });

            window.addEventListener('keyup', (e) => { keys[e.key] = false; });

            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                if (touch.clientX - rect.left < gameWidth / 2) {
                    touchActive = true;
                    touchY = touch.clientY - rect.top;
                    playerY = clamp(touchY - paddleHeight / 2, 0, gameHeight - paddleHeight);
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (touchActive) {
                    const rect = canvas.getBoundingClientRect();
                    touchY = e.touches[0].clientY - rect.top;
                    playerY = clamp(touchY - paddleHeight / 2, 0, gameHeight - paddleHeight);
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchActive = false;
            }, { passive: false });

            function addButtonListeners(btn, setPressed) {
                btn.addEventListener('touchstart', (e) => { e.preventDefault();
                    initAudio();
                    setPressed(true); }, { passive: false });
                btn.addEventListener('touchend', (e) => { e.preventDefault();
                    setPressed(false); }, { passive: false });
                btn.addEventListener('touchcancel', (e) => { e.preventDefault();
                    setPressed(false); }, { passive: false });
                btn.addEventListener('mousedown', (e) => { e.preventDefault();
                    initAudio();
                    setPressed(true); });
                btn.addEventListener('mouseup', (e) => { e.preventDefault();
                    setPressed(false); });
                btn.addEventListener('mouseleave', () => { setPressed(false); });
            }

            addButtonListeners(btnUp, (p) => { btnUpPressed = p; });
            addButtonListeners(btnDown, (p) => { btnDownPressed = p; });

            pauseBtn.addEventListener('click', () => { initAudio();
                togglePause(); });
            restartBtn.addEventListener('click', () => { initAudio();
                detectMobile();
                resize();
                resetGame(); });

            function togglePause() {
                if (gameOver) return;
                paused = !paused;
                pauseBtn.textContent = paused ? '▶ ИГРАТЬ' : '⏯ ПАУЗА';
                updateMessage();
            }

            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => { detectMobile();
                    resize(); }, 250);
            });

            window.addEventListener('orientationchange', () => {
                setTimeout(() => { detectMobile();
                    resize(); }, 400);
            });

            document.addEventListener('click', initAudio, { once: true });
            document.addEventListener('touchstart', initAudio, { once: true });

            // ==================== ЗАПУСК ====================
            detectMobile();
            resize();
            resetGame();
            gameLoop();

            console.log('✅ Игра запущена');
            console.log('📱 isMobile:', isMobile);
            console.log('📏 Поле:', gameWidth + 'x' + gameHeight,
                '| Ракетка:', paddleHeight + 'px',
                '| Мяч:', ballSize + 'px');
            console.log('📱 Множители — ракетка: ×' + MOBILE_PADDLE_MULTIPLIER +
                ' | мяч: ×' + MOBILE_BALL_MULTIPLIER);
        })();
    </script>
