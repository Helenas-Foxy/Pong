<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Пинг-понг</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --field: #0d5e2e;
            --white: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            touch-action: none; /* отключаем жесты браузера на мобилках */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        #scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 800px;
            color: var(--white);
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        #player-score,
        #ai-score {
            font-size: 48px;
            min-width: 60px;
            text-align: center;
        }

        #pause-btn {
            background: transparent;
            border: 2px solid var(--white);
            color: var(--white);
            padding: 8px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        #pause-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        canvas {
            border: 3px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
            /* 16:9 соотношение */
            max-width: 100vw;
            max-height: 60vh;
        }

        #message {
            color: var(--white);
            font-size: 20px;
            text-align: center;
            min-height: 30px;
            letter-spacing: 1px;
        }

        #restart-btn {
            display: none;
            background: var(--white);
            color: var(--bg);
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            letter-spacing: 2px;
            transition: transform 0.1s;
        }

        #restart-btn:hover {
            transform: scale(1.05);
        }

        #restart-btn:active {
            transform: scale(0.95);
        }

        /* Подсказка по управлению */
        #controls-hint {
            color: #888;
            font-size: 13px;
            text-align: center;
        }

        @media (max-width: 600px) {
            #player-score,
            #ai-score {
                font-size: 32px;
                min-width: 40px;
            }
            #scoreboard {
                font-size: 18px;
            }
            #pause-btn {
                padding: 6px 14px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Счёт -->
        <div id="scoreboard">
            <span>ВЫ</span>
            <span id="player-score">0</span>
            <button id="pause-btn" title="Пробел для паузы">⏯ ПАУЗА</button>
            <span id="ai-score">0</span>
            <span>AI</span>
        </div>

        <!-- Игровое поле -->
        <canvas id="game"></canvas>

        <!-- Сообщения -->
        <div id="message">Стрелки ↑↓ / касание левой половины экрана</div>
        <button id="restart-btn">🔄 ИГРАТЬ СНОВА</button>
        <div id="controls-hint">Пробел — пауза | R — рестарт</div>
    </div>

    <script>
        (function() {
            // ==================== DOM-ЭЛЕМЕНТЫ ====================
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');
            const playerScoreEl = document.getElementById('player-score');
            const aiScoreEl = document.getElementById('ai-score');
            const messageEl = document.getElementById('message');
            const restartBtn = document.getElementById('restart-btn');
            const pauseBtn = document.getElementById('pause-btn');

            // ==================== АУДИО (Web Audio API) ====================
            let audioCtx = null;

            /** Инициализация аудиоконтекста (требуется после взаимодействия пользователя) */
            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            /** Проигрывает тон заданной частоты и длительности */
            function playTone(freq, duration, type = 'square', volume = 0.15) {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + duration);
            }

            /** Звук отскока от ракетки — высокий «пинг» */
            function soundPaddleHit() {
                playTone(880, 0.08, 'square', 0.12);
                setTimeout(() => playTone(1100, 0.05, 'square', 0.08), 40);
            }

            /** Звук отскока от стены — ниже */
            function soundWallHit() {
                playTone(440, 0.1, 'triangle', 0.1);
            }

            /** Звук гола — низкий, «проигрышный» */
            function soundGoal() {
                playTone(180, 0.25, 'sawtooth', 0.2);
                setTimeout(() => playTone(120, 0.3, 'sawtooth', 0.15), 150);
            }

            /** Звук победы */
            function soundWin() {
                playTone(660, 0.12, 'square', 0.1);
                setTimeout(() => playTone(880, 0.12, 'square', 0.1), 120);
                setTimeout(() => playTone(1100, 0.2, 'square', 0.12), 240);
            }

            // ==================== КОНСТАНТЫ ИГРЫ ====================
            const WIN_SCORE = 5;
            const FIELD_RATIO = 16 / 9;
            const PADDLE_RATIO = 1 / 10; // ракетка = 1/10 высоты поля

            // Базовые размеры (будут пересчитаны)
            const BASE_WIDTH = 800;
            const BASE_HEIGHT = BASE_WIDTH / FIELD_RATIO; // 450

            // ==================== ПЕРЕМЕННЫЕ СОСТОЯНИЯ ====================
            let gameWidth, gameHeight;
            let paddleWidth, paddleHeight;
            let ballSize;

            // Позиции (в пикселях, будут инициализированы в resize)
            let playerY, aiY;
            let ballX, ballY;
            let ballSpeedX, ballSpeedY;
            const BALL_SPEED = 6; // базовая скорость мяча (пикселей/кадр при 60fps)

            let playerScore = 0;
            let aiScore = 0;
            let gameOver = false;
            let paused = false;
            let gameStarted = false;

            // Частицы для эффекта удара
            let particles = [];

            // Управление
            const keys = {};
            let touchActive = false;
            let touchY = 0;

            // ==================== ИНИЦИАЛИЗАЦИЯ ====================

            /** Пересчёт размеров под текущий экран */
            function resize() {
                const maxWidth = Math.min(window.innerWidth - 20, 800);
                const maxHeight = Math.min(window.innerHeight * 0.55, 500);

                // Сохраняем соотношение 16:9
                if (maxWidth / maxHeight > FIELD_RATIO) {
                    gameHeight = maxHeight;
                    gameWidth = gameHeight * FIELD_RATIO;
                } else {
                    gameWidth = maxWidth;
                    gameHeight = gameWidth / FIELD_RATIO;
                }

                canvas.width = gameWidth;
                canvas.height = gameHeight;

                // Размеры ракетки: ширина фиксированная, высота = 1/10 высоты поля
                paddleHeight = Math.round(gameHeight * PADDLE_RATIO);
                paddleWidth = Math.round(gameWidth * 0.02); // 2% ширины поля

                // Размер мяча
                ballSize = Math.round(gameHeight * 0.025);

                // Если игра не идёт — центрируем ракетки
                if (!gameStarted && !gameOver) {
                    playerY = gameHeight / 2 - paddleHeight / 2;
                    aiY = gameHeight / 2 - paddleHeight / 2;
                }
                // Ограничиваем позиции ракеток новыми границами
                playerY = clamp(playerY, 0, gameHeight - paddleHeight);
                aiY = clamp(aiY, 0, gameHeight - paddleHeight);
            }

            function clamp(val, min, max) {
                return Math.max(min, Math.min(max, val));
            }

            /** Сброс мяча в центр */
            function resetBall(direction = 1) {
                ballX = gameWidth / 2;
                ballY = gameHeight / 2;
                // Случайный угол от -45° до +45°
                const angle = (Math.random() * Math.PI / 2) - Math.PI / 4;
                ballSpeedX = BALL_SPEED * Math.cos(angle) * direction;
                ballSpeedY = BALL_SPEED * Math.sin(angle);
            }

            /** Полный сброс игры */
            function resetGame() {
                playerScore = 0;
                aiScore = 0;
                gameOver = false;
                paused = false;
                gameStarted = true;
                particles = [];
                updateScoreDisplay();
                restartBtn.style.display = 'none';
                messageEl.textContent = 'Стрелки ↑↓ / касание левой половины экрана';
                pauseBtn.textContent = '⏯ ПАУЗА';

                playerY = gameHeight / 2 - paddleHeight / 2;
                aiY = gameHeight / 2 - paddleHeight / 2;
                resetBall(Math.random() > 0.5 ? 1 : -1);
            }

            /** Обновление отображения счёта */
            function updateScoreDisplay() {
                playerScoreEl.textContent = playerScore;
                aiScoreEl.textContent = aiScore;
            }

            // ==================== ЧАСТИЦЫ ====================

            /** Создаёт вспышку частиц в точке удара */
            function spawnParticles(x, y) {
                const count = 12;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 4;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1.0, // от 1 до 0
                        decay: 0.03 + Math.random() * 0.04,
                        size: 2 + Math.random() * 4,
                    });
                }
            }

            /** Обновление и отрисовка частиц */
            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
            }

            function drawParticles() {
                for (const p of particles) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ==================== AI (средняя сложность) ====================

            function updateAI() {
                // AI двигается с небольшой задержкой и ограниченной скоростью
                const aiSpeed = gameHeight * 0.012; // скорость AI
                const aiCenter = aiY + paddleHeight / 2;
                const ballCenter = ballY;

                // AI преследует мяч только если тот летит в его сторону
                if (ballSpeedX > 0) {
                    // Добавляем "человеческую" неточность: целимся с небольшим смещением
                    const targetOffset = (Math.sin(Date.now() / 800) * paddleHeight * 0.25);
                    const target = ballCenter + targetOffset;

                    if (aiCenter < target - 5) {
                        aiY += aiSpeed;
                    } else if (aiCenter > target + 5) {
                        aiY -= aiSpeed;
                    }
                } else {
                    // Мяч летит от AI — медленно возвращаемся в центр
                    const center = gameHeight / 2;
                    if (aiCenter < center - 10) {
                        aiY += aiSpeed * 0.5;
                    } else if (aiCenter > center + 10) {
                        aiY -= aiSpeed * 0.5;
                    }
                }

                // Ограничение
                aiY = clamp(aiY, 0, gameHeight - paddleHeight);
            }

            // ==================== ОБНОВЛЕНИЕ ИГРЫ ====================

            function update() {
                if (paused || gameOver) return;

                // --- Движение игрока ---
                const playerSpeed = gameHeight * 0.018;
                if (keys['ArrowUp'] || keys['ArrowDown']) {
                    initAudio(); // инициализируем аудио при первом взаимодействии
                }
                if (keys['ArrowUp']) {
                    playerY -= playerSpeed;
                }
                if (keys['ArrowDown']) {
                    playerY += playerSpeed;
                }
                playerY = clamp(playerY, 0, gameHeight - paddleHeight);

                // --- AI ---
                updateAI();

                // --- Движение мяча ---
                ballX += ballSpeedX;
                ballY += ballSpeedY;

                // Отскок от верхней/нижней стенки
                if (ballY - ballSize / 2 <= 0) {
                    ballY = ballSize / 2;
                    ballSpeedY = Math.abs(ballSpeedY);
                    soundWallHit();
                    spawnParticles(ballX, 0);
                }
                if (ballY + ballSize / 2 >= gameHeight) {
                    ballY = gameHeight - ballSize / 2;
                    ballSpeedY = -Math.abs(ballSpeedY);
                    soundWallHit();
                    spawnParticles(ballX, gameHeight);
                }

                // Отскок от ракетки игрока (левая)
                if (
                    ballX - ballSize / 2 <= paddleWidth &&
                    ballY + ballSize / 2 >= playerY &&
                    ballY - ballSize / 2 <= playerY + paddleHeight &&
                    ballSpeedX < 0
                ) {
                    ballX = paddleWidth + ballSize / 2;
                    const hitPos = (ballY - (playerY + paddleHeight / 2)) / (paddleHeight / 2);
                    const angle = hitPos * (Math.PI / 4); // от -45° до +45°
                    ballSpeedX = BALL_SPEED * Math.cos(angle);
                    ballSpeedY = BALL_SPEED * Math.sin(angle);
                    soundPaddleHit();
                    spawnParticles(ballX, ballY);
                }

                // Отскок от ракетки AI (правая)
                if (
                    ballX + ballSize / 2 >= gameWidth - paddleWidth &&
                    ballY + ballSize / 2 >= aiY &&
                    ballY - ballSize / 2 <= aiY + paddleHeight &&
                    ballSpeedX > 0
                ) {
                    ballX = gameWidth - paddleWidth - ballSize / 2;
                    const hitPos = (ballY - (aiY + paddleHeight / 2)) / (paddleHeight / 2);
                    const angle = hitPos * (Math.PI / 4);
                    ballSpeedX = -BALL_SPEED * Math.cos(angle);
                    ballSpeedY = BALL_SPEED * Math.sin(angle);
                    soundPaddleHit();
                    spawnParticles(ballX, ballY);
                }

                // Гол: мяч ушёл за левую границу (AI забивает)
                if (ballX + ballSize / 2 < 0) {
                    aiScore++;
                    updateScoreDisplay();
                    soundGoal();
                    if (aiScore >= WIN_SCORE) {
                        endGame('AI');
                    } else {
                        resetBall(1);
                    }
                }

                // Гол: мяч ушёл за правую границу (игрок забивает)
                if (ballX - ballSize / 2 > gameWidth) {
                    playerScore++;
                    updateScoreDisplay();
                    soundGoal();
                    if (playerScore >= WIN_SCORE) {
                        endGame('Игрок');
                    } else {
                        resetBall(-1);
                    }
                }

                // Обновление частиц
                updateParticles();
            }

            /** Завершение игры */
            function endGame(winner) {
                gameOver = true;
                if (winner === 'Игрок') {
                    messageEl.textContent = '🎉 ВЫ ПОБЕДИЛИ! 🎉';
                    soundWin();
                } else {
                    messageEl.textContent = '😞 AI победил... Попробуйте снова!';
                }
                restartBtn.style.display = 'inline-block';
                pauseBtn.textContent = '⏯ ПАУЗА';
            }

            // ==================== ОТРИСОВКА ====================

            function draw() {
                // Очистка
                ctx.clearRect(0, 0, gameWidth, gameHeight);

                // Зелёное поле
                ctx.fillStyle = '#0d5e2e';
                ctx.fillRect(0, 0, gameWidth, gameHeight);

                // Более тёмные края (эффект глубины)
                const gradient = ctx.createRadialGradient(
                    gameWidth / 2, gameHeight / 2, gameWidth * 0.4,
                    gameWidth / 2, gameHeight / 2, gameWidth * 0.9
                );
                gradient.addColorStop(0, 'rgba(0,0,0,0)');
                gradient.addColorStop(1, 'rgba(0,0,0,0.25)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, gameWidth, gameHeight);

                // Центральная белая пунктирная линия
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.lineWidth = Math.max(2, gameWidth * 0.004);
                ctx.setLineDash([gameHeight * 0.04, gameHeight * 0.04]);
                ctx.beginPath();
                ctx.moveTo(gameWidth / 2, 0);
                ctx.lineTo(gameWidth / 2, gameHeight);
                ctx.stroke();
                ctx.setLineDash([]); // сброс

                // Центральный круг
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
                ctx.lineWidth = Math.max(2, gameWidth * 0.003);
                ctx.beginPath();
                ctx.arc(gameWidth / 2, gameHeight / 2, gameHeight * 0.12, 0, Math.PI * 2);
                ctx.stroke();

                // Ракетка игрока (левая) — белая с лёгкой тенью
                ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(0, playerY, paddleWidth, paddleHeight);
                ctx.shadowBlur = 0;

                // Ракетка AI (правая)
                ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(gameWidth - paddleWidth, aiY, paddleWidth, paddleHeight);
                ctx.shadowBlur = 0;

                // Мяч
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = 'rgba(255, 255, 255, 0.6)';
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(ballX, ballY, ballSize / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Частицы
                drawParticles();

                // Если пауза — затемнение и надпись
                if (paused && !gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, gameWidth, gameHeight);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `${Math.round(gameHeight * 0.1)}px "Segoe UI", Arial, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('ПАУЗА', gameWidth / 2, gameHeight / 2);
                    ctx.textAlign = 'start';
                }
            }

            // ==================== ИГРОВОЙ ЦИКЛ ====================

            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            // ==================== ОБРАБОТЧИКИ СОБЫТИЙ ====================

            // Клавиатура
            window.addEventListener('keydown', (e) => {
                keys[e.key] = true;

                // Пауза по пробелу
                if (e.key === ' ' || e.code === 'Space') {
                    e.preventDefault();
                    if (!gameOver) {
                        initAudio();
                        togglePause();
                    }
                }

                // Рестарт по R
                if (e.key === 'r' || e.key === 'R') {
                    e.preventDefault();
                    initAudio();
                    resize();
                    resetGame();
                }

                // Предотвращаем скролл страницы стрелками
                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    e.preventDefault();
                }
            });

            window.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            // Тач-управление (мобильные)
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const touchCanvasX = touch.clientX - rect.left;
                // Только касания левой половины экрана управляют ракеткой
                if (touchCanvasX < gameWidth / 2) {
                    touchActive = true;
                    touchY = touch.clientY - rect.top;
                    // Мгновенно перемещаем ракетку к пальцу
                    playerY = clamp(touchY - paddleHeight / 2, 0, gameHeight - paddleHeight);
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (touchActive) {
                    const rect = canvas.getBoundingClientRect();
                    touchY = e.touches[0].clientY - rect.top;
                    playerY = clamp(touchY - paddleHeight / 2, 0, gameHeight - paddleHeight);
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchActive = false;
            }, { passive: false });

            // Кнопка паузы
            pauseBtn.addEventListener('click', () => {
                initAudio();
                togglePause();
            });

            // Кнопка рестарта
            restartBtn.addEventListener('click', () => {
                initAudio();
                resize();
                resetGame();
            });

            function togglePause() {
                if (gameOver) return;
                paused = !paused;
                pauseBtn.textContent = paused ? '▶ ПРОДОЛЖИТЬ' : '⏯ ПАУЗА';
                if (paused) {
                    messageEl.textContent = 'Игра на паузе';
                } else {
                    messageEl.textContent = 'Стрелки ↑↓ / касание левой половины экрана';
                }
            }

            // Ресайз окна
            window.addEventListener('resize', () => {
                resize();
            });

            // Инициализация аудио при первом клике/касании (политика браузеров)
            document.addEventListener('click', initAudio, { once: true });
            document.addEventListener('touchstart', initAudio, { once: true });

            // ==================== ЗАПУСК ====================
            resize();
            resetGame();
            gameLoop();

            console.log('🏓 Пинг-понг готов!');
            console.log('🎮 Управление: стрелки ↑↓ или касание левой половины экрана');
            console.log('⏯ Пробел — пауза | R — рестарт');
            console.log('📱 На телефоне: касайтесь и водите пальцем по левой стороне поля');
        })();
    </script>
</body>
</html>
