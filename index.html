<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Пинг-понг</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --field: #0d5e2e;
            --white: #f0f0f0;
            --btn-mobile: #2a2a4a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh; /* динамическая высота для мобильных */
            overflow: hidden;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            touch-action: manipulation; /* разрешаем тапы, но не зум/скролл */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            width: 100%;
            max-width: 800px;
            padding: 5px;
        }

        #scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            color: var(--white);
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 0 5px;
        }

        #player-score,
        #ai-score {
            font-size: 40px;
            min-width: 50px;
            text-align: center;
            transition: transform 0.15s;
        }

        .score-pop {
            transform: scale(1.3);
            color: #ffd700;
        }

        #pause-btn {
            background: transparent;
            border: 2px solid var(--white);
            color: var(--white);
            padding: 6px 16px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        #pause-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }
        #pause-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        canvas {
            border: 3px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            max-width: 100%;
            /* высота ограничена чтобы осталось место для кнопок */
            max-height: 55vh;
            max-height: 55dvh;
        }

        #message {
            color: #ccc;
            font-size: 16px;
            text-align: center;
            min-height: 22px;
            letter-spacing: 0.5px;
        }

        #restart-btn {
            display: none;
            background: var(--white);
            color: var(--bg);
            border: none;
            padding: 10px 28px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            letter-spacing: 2px;
            transition: transform 0.1s;
        }

        #restart-btn:hover {
            transform: scale(1.05);
        }
        #restart-btn:active {
            transform: scale(0.95);
        }

        /* ==================== МОБИЛЬНЫЕ КНОПКИ ==================== */
        #mobile-controls {
            display: none; /* скрыты на десктопе */
            width: 100%;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            padding: 0 5px;
        }

        .mobile-btn {
            flex: 1;
            background: var(--btn-mobile);
            border: 2px solid rgba(255, 255, 255, 0.4);
            color: var(--white);
            font-size: 32px;
            font-weight: bold;
            padding: 16px 0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 60px;
            letter-spacing: 2px;
        }

        .mobile-btn:active {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.8);
            transform: scale(0.96);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .btn-up {
            border-radius: 12px 12px 12px 12px;
        }
        .btn-down {
            border-radius: 12px 12px 12px 12px;
        }

        .btn-icon {
            font-size: 28px;
            line-height: 1;
        }

        /* Подсказка */
        #controls-hint {
            color: #777;
            font-size: 12px;
            text-align: center;
        }

        /* Показываем мобильные кнопки на маленьких экранах */
        @media (max-width: 768px) {
            #mobile-controls {
                display: flex;
            }
            #controls-hint {
                display: none; /* скрываем подсказку клавиатуры */
            }
            canvas {
                max-height: 45vh;
                max-height: 45dvh;
            }
            #player-score,
            #ai-score {
                font-size: 30px;
                min-width: 35px;
            }
            #scoreboard {
                font-size: 16px;
            }
            #pause-btn {
                padding: 5px 12px;
                font-size: 12px;
            }
            #message {
                font-size: 14px;
                min-height: 18px;
            }
        }

        @media (max-width: 400px) {
            .mobile-btn {
                font-size: 24px;
                padding: 12px 0;
                min-height: 50px;
            }
            .btn-icon {
                font-size: 22px;
            }
            canvas {
                max-height: 40vh;
                max-height: 40dvh;
            }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Счёт -->
        <div id="scoreboard">
            <span>ВЫ</span>
            <span id="player-score">0</span>
            <button id="pause-btn" title="Пробел для паузы">⏯ ПАУЗА</button>
            <span id="ai-score">0</span>
            <span>AI</span>
        </div>

        <!-- Игровое поле -->
        <canvas id="game"></canvas>

        <!-- Мобильные кнопки управления -->
        <div id="mobile-controls">
            <button class="mobile-btn btn-up" id="btn-up">
                <span class="btn-icon">▲</span> ВВЕРХ
            </button>
            <button class="mobile-btn btn-down" id="btn-down">
                <span class="btn-icon">▼</span> ВНИЗ
            </button>
        </div>

        <!-- Сообщения -->
        <div id="message">Стрелки ↑↓ / касание левой половины экрана</div>
        <button id="restart-btn">🔄 ИГРАТЬ СНОВА</button>
        <div id="controls-hint">Пробел — пауза | R — рестарт</div>
    </div>

    <script>
        (function() {
            // ==================== DOM-ЭЛЕМЕНТЫ ====================
            const canvas = document.getElementById('game');
            const ctx = canvas.getContext('2d');
            const playerScoreEl = document.getElementById('player-score');
            const aiScoreEl = document.getElementById('ai-score');
            const messageEl = document.getElementById('message');
            const restartBtn = document.getElementById('restart-btn');
            const pauseBtn = document.getElementById('pause-btn');
            const btnUp = document.getElementById('btn-up');
            const btnDown = document.getElementById('btn-down');
            const mobileControls = document.getElementById('mobile-controls');

            // ==================== АУДИО (Web Audio API) ====================
            let audioCtx = null;

            function initAudio() {
                if (!audioCtx) {
                    audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }
            }

            function playTone(freq, duration, type = 'square', volume = 0.15) {
                if (!audioCtx) return;
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(volume, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + duration);
            }

            function soundPaddleHit() {
                playTone(880, 0.08, 'square', 0.12);
                setTimeout(() => playTone(1100, 0.05, 'square', 0.08), 40);
            }

            function soundWallHit() {
                playTone(440, 0.1, 'triangle', 0.1);
            }

            function soundGoal() {
                playTone(180, 0.25, 'sawtooth', 0.2);
                setTimeout(() => playTone(120, 0.3, 'sawtooth', 0.15), 150);
            }

            function soundWin() {
                playTone(660, 0.12, 'square', 0.1);
                setTimeout(() => playTone(880, 0.12, 'square', 0.1), 120);
                setTimeout(() => playTone(1100, 0.2, 'square', 0.12), 240);
            }

            // ==================== КОНСТАНТЫ ====================
            const WIN_SCORE = 5;
            const FIELD_RATIO = 16 / 9;
            const PADDLE_RATIO_BASE = 1 / 10; // базовая высота ракетки для десктопа
            const BALL_SIZE_BASE = 0.025; // базовый размер мяча относительно высоты поля

            // Множители для мобильной версии
            const MOBILE_PADDLE_MULTIPLIER = 3; // ракетка в 3 раза больше
            const MOBILE_BALL_MULTIPLIER = 10; // мяч в 10 раз больше

            // ==================== ПЕРЕМЕННЫЕ СОСТОЯНИЯ ====================
            let gameWidth, gameHeight;
            let paddleWidth, paddleHeight;
            let ballSize;
            let isMobile = false; // определяется в detectMobile()

            let playerY, aiY;
            let ballX, ballY;
            let ballSpeedX, ballSpeedY;
            const BALL_SPEED = 6;

            let playerScore = 0;
            let aiScore = 0;
            let gameOver = false;
            let paused = false;
            let gameStarted = false;

            let particles = [];

            // Управление
            const keys = {};
            let touchActive = false;
            let touchY = 0;
            // Для мобильных кнопок: удержание
            let btnUpPressed = false;
            let btnDownPressed = false;

            // ==================== ОПРЕДЕЛЕНИЕ МОБИЛЬНОГО УСТРОЙСТВА ====================
            function detectMobile() {
                // Проверяем и ширину экрана, и наличие тач-интерфейса
                const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                const smallScreen = window.innerWidth <= 768;
                isMobile = hasTouch && smallScreen;

                // Показываем/скрываем мобильные кнопки
                if (mobileControls) {
                    mobileControls.style.display = isMobile ? 'flex' : 'none';
                }

                // Обновляем подсказку
                if (isMobile) {
                    messageEl.textContent = 'Кнопки ▼▲ или касание левой половины';
                } else {
                    messageEl.textContent = 'Стрелки ↑↓ / Пробел — пауза | R — рестарт';
                }

                updateSizes();
            }

            /** Пересчёт размеров с учётом мобильных множителей */
            function updateSizes() {
                if (gameHeight <= 0) return;

                if (isMobile) {
                    paddleHeight = Math.round(gameHeight * PADDLE_RATIO_BASE * MOBILE_PADDLE_MULTIPLIER);
                    ballSize = Math.round(gameHeight * BALL_SIZE_BASE * MOBILE_BALL_MULTIPLIER);
                } else {
                    paddleHeight = Math.round(gameHeight * PADDLE_RATIO_BASE);
                    ballSize = Math.round(gameHeight * BALL_SIZE_BASE);
                }

                paddleWidth = Math.round(gameWidth * 0.02);

                // Ограничиваем ракетку, чтобы не выходила за поле
                paddleHeight = Math.min(paddleHeight, gameHeight * 0.35);
                ballSize = Math.min(ballSize, gameHeight * 0.15);

                // Корректируем позиции после изменения размеров
                playerY = clamp(playerY, 0, gameHeight - paddleHeight);
                aiY = clamp(aiY, 0, gameHeight - paddleHeight);
            }

            // ==================== ИНИЦИАЛИЗАЦИЯ ====================
            function clamp(val, min, max) {
                return Math.max(min, Math.min(max, val));
            }

            function resize() {
                const maxWidth = Math.min(window.innerWidth - 16, 800);
                // Оставляем место для кнопок на мобильных
                const maxHeight = isMobile ?
                    Math.min(window.innerHeight * 0.42, 400) :
                    Math.min(window.innerHeight * 0.55, 500);

                if (maxWidth / maxHeight > FIELD_RATIO) {
                    gameHeight = Math.floor(maxHeight);
                    gameWidth = Math.floor(gameHeight * FIELD_RATIO);
                } else {
                    gameWidth = Math.floor(maxWidth);
                    gameHeight = Math.floor(gameWidth / FIELD_RATIO);
                }

                canvas.width = gameWidth;
                canvas.height = gameHeight;

                updateSizes();

                if (!gameStarted && !gameOver) {
                    playerY = gameHeight / 2 - paddleHeight / 2;
                    aiY = gameHeight / 2 - paddleHeight / 2;
                }
                playerY = clamp(playerY, 0, gameHeight - paddleHeight);
                aiY = clamp(aiY, 0, gameHeight - paddleHeight);
            }

            function resetBall(direction = 1) {
                ballX = gameWidth / 2;
                ballY = gameHeight / 2;
                const angle = (Math.random() * Math.PI / 2) - Math.PI / 4;
                ballSpeedX = BALL_SPEED * Math.cos(angle) * direction;
                ballSpeedY = BALL_SPEED * Math.sin(angle);
            }

            function resetGame() {
                playerScore = 0;
                aiScore = 0;
                gameOver = false;
                paused = false;
                gameStarted = true;
                particles = [];
                updateScoreDisplay();
                restartBtn.style.display = 'none';
                pauseBtn.textContent = '⏯ ПАУЗА';
                playerScoreEl.classList.remove('score-pop');
                aiScoreEl.classList.remove('score-pop');

                if (isMobile) {
                    messageEl.textContent = 'Кнопки ▼▲ или касание левой половины';
                } else {
                    messageEl.textContent = 'Стрелки ↑↓ / Пробел — пауза | R — рестарт';
                }

                playerY = gameHeight / 2 - paddleHeight / 2;
                aiY = gameHeight / 2 - paddleHeight / 2;
                resetBall(Math.random() > 0.5 ? 1 : -1);
            }

            function updateScoreDisplay() {
                playerScoreEl.textContent = playerScore;
                aiScoreEl.textContent = aiScore;
            }

            function popScore(el) {
                el.classList.add('score-pop');
                setTimeout(() => el.classList.remove('score-pop'), 200);
            }

            // ==================== ЧАСТИЦЫ ====================
            function spawnParticles(x, y) {
                const count = isMobile ? 20 : 12; // больше частиц на мобильных
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 2 + Math.random() * 4;
                    particles.push({
                        x: x,
                        y: y,
                        vx: Math.cos(angle) * speed,
                        vy: Math.sin(angle) * speed,
                        life: 1.0,
                        decay: 0.03 + Math.random() * 0.04,
                        size: 2 + Math.random() * (isMobile ? 6 : 4),
                    });
                }
            }

            function updateParticles() {
                for (let i = particles.length - 1; i >= 0; i--) {
                    const p = particles[i];
                    p.x += p.vx;
                    p.y += p.vy;
                    p.life -= p.decay;
                    if (p.life <= 0) {
                        particles.splice(i, 1);
                    }
                }
            }

            function drawParticles() {
                for (const p of particles) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${p.life})`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            // ==================== AI ====================
            function updateAI() {
                const aiSpeed = gameHeight * 0.012;
                const aiCenter = aiY + paddleHeight / 2;
                const ballCenter = ballY;

                if (ballSpeedX > 0) {
                    const targetOffset = (Math.sin(Date.now() / 800) * paddleHeight * 0.25);
                    const target = ballCenter + targetOffset;

                    if (aiCenter < target - 5) {
                        aiY += aiSpeed;
                    } else if (aiCenter > target + 5) {
                        aiY -= aiSpeed;
                    }
                } else {
                    const center = gameHeight / 2;
                    if (aiCenter < center - 10) {
                        aiY += aiSpeed * 0.5;
                    } else if (aiCenter > center + 10) {
                        aiY -= aiSpeed * 0.5;
                    }
                }

                aiY = clamp(aiY, 0, gameHeight - paddleHeight);
            }

            // ==================== ОБНОВЛЕНИЕ ИГРЫ ====================
            function update() {
                if (paused || gameOver) return;

                // --- Движение игрока ---
                const playerSpeed = gameHeight * (isMobile ? 0.022 : 0.018);

                // Клавиатура
                if (keys['ArrowUp'] || keys['ArrowDown']) {
                    initAudio();
                }
                if (keys['ArrowUp']) playerY -= playerSpeed;
                if (keys['ArrowDown']) playerY += playerSpeed;

                // Мобильные кнопки (удержание)
                if (btnUpPressed) {
                    initAudio();
                    playerY -= playerSpeed;
                }
                if (btnDownPressed) {
                    initAudio();
                    playerY += playerSpeed;
                }

                playerY = clamp(playerY, 0, gameHeight - paddleHeight);

                // --- AI ---
                updateAI();

                // --- Мяч ---
                ballX += ballSpeedX;
                ballY += ballSpeedY;

                // Отскок от стен
                if (ballY - ballSize / 2 <= 0) {
                    ballY = ballSize / 2;
                    ballSpeedY = Math.abs(ballSpeedY);
                    soundWallHit();
                    spawnParticles(ballX, 0);
                }
                if (ballY + ballSize / 2 >= gameHeight) {
                    ballY = gameHeight - ballSize / 2;
                    ballSpeedY = -Math.abs(ballSpeedY);
                    soundWallHit();
                    spawnParticles(ballX, gameHeight);
                }

                // Отскок от ракетки игрока
                if (
                    ballX - ballSize / 2 <= paddleWidth &&
                    ballY + ballSize / 2 >= playerY &&
                    ballY - ballSize / 2 <= playerY + paddleHeight &&
                    ballSpeedX < 0
                ) {
                    ballX = paddleWidth + ballSize / 2;
                    const hitPos = (ballY - (playerY + paddleHeight / 2)) / (paddleHeight / 2);
                    const maxAngle = Math.PI / 4; // 45°
                    const angle = hitPos * maxAngle;
                    ballSpeedX = BALL_SPEED * Math.cos(angle);
                    ballSpeedY = BALL_SPEED * Math.sin(angle);
                    soundPaddleHit();
                    spawnParticles(ballX, ballY);
                }

                // Отскок от ракетки AI
                if (
                    ballX + ballSize / 2 >= gameWidth - paddleWidth &&
                    ballY + ballSize / 2 >= aiY &&
                    ballY - ballSize / 2 <= aiY + paddleHeight &&
                    ballSpeedX > 0
                ) {
                    ballX = gameWidth - paddleWidth - ballSize / 2;
                    const hitPos = (ballY - (aiY + paddleHeight / 2)) / (paddleHeight / 2);
                    const maxAngle = Math.PI / 4;
                    const angle = hitPos * maxAngle;
                    ballSpeedX = -BALL_SPEED * Math.cos(angle);
                    ballSpeedY = BALL_SPEED * Math.sin(angle);
                    soundPaddleHit();
                    spawnParticles(ballX, ballY);
                }

                // Голы
                if (ballX + ballSize / 2 < 0) {
                    aiScore++;
                    updateScoreDisplay();
                    popScore(aiScoreEl);
                    soundGoal();
                    if (aiScore >= WIN_SCORE) {
                        endGame('AI');
                    } else {
                        resetBall(1);
                    }
                }

                if (ballX - ballSize / 2 > gameWidth) {
                    playerScore++;
                    updateScoreDisplay();
                    popScore(playerScoreEl);
                    soundGoal();
                    if (playerScore >= WIN_SCORE) {
                        endGame('Игрок');
                    } else {
                        resetBall(-1);
                    }
                }

                updateParticles();
            }

            function endGame(winner) {
                gameOver = true;
                if (winner === 'Игрок') {
                    messageEl.textContent = '🎉 ВЫ ПОБЕДИЛИ! 🎉';
                    soundWin();
                } else {
                    messageEl.textContent = '😞 AI победил... Попробуйте снова!';
                }
                restartBtn.style.display = 'inline-block';
                pauseBtn.textContent = '⏯ ПАУЗА';
            }

            // ==================== ОТРИСОВКА ====================
            function draw() {
                ctx.clearRect(0, 0, gameWidth, gameHeight);

                // Поле
                ctx.fillStyle = '#0d5e2e';
                ctx.fillRect(0, 0, gameWidth, gameHeight);

                // Градиент глубины
                const gradient = ctx.createRadialGradient(
                    gameWidth / 2, gameHeight / 2, gameWidth * 0.4,
                    gameWidth / 2, gameHeight / 2, gameWidth * 0.9
                );
                gradient.addColorStop(0, 'rgba(0,0,0,0)');
                gradient.addColorStop(1, 'rgba(0,0,0,0.25)');
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, gameWidth, gameHeight);

                // Центральная линия
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
                ctx.lineWidth = Math.max(2, gameWidth * 0.004);
                ctx.setLineDash([gameHeight * 0.04, gameHeight * 0.04]);
                ctx.beginPath();
                ctx.moveTo(gameWidth / 2, 0);
                ctx.lineTo(gameWidth / 2, gameHeight);
                ctx.stroke();
                ctx.setLineDash([]);

                // Центральный круг
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
                ctx.lineWidth = Math.max(2, gameWidth * 0.003);
                ctx.beginPath();
                ctx.arc(gameWidth / 2, gameHeight / 2, gameHeight * 0.12, 0, Math.PI * 2);
                ctx.stroke();

                // Ракетка игрока
                ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(0, playerY, paddleWidth, paddleHeight);
                ctx.shadowBlur = 0;

                // Ракетка AI
                ctx.shadowColor = 'rgba(255, 255, 255, 0.4)';
                ctx.shadowBlur = 8;
                ctx.fillStyle = '#f0f0f0';
                ctx.fillRect(gameWidth - paddleWidth, aiY, paddleWidth, paddleHeight);
                ctx.shadowBlur = 0;

                // Мяч
                ctx.fillStyle = '#ffffff';
                ctx.shadowColor = 'rgba(255, 255, 255, 0.7)';
                ctx.shadowBlur = isMobile ? 16 : 10;
                ctx.beginPath();
                ctx.arc(ballX, ballY, ballSize / 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;

                // Частицы
                drawParticles();

                // Пауза
                if (paused && !gameOver) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
                    ctx.fillRect(0, 0, gameWidth, gameHeight);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `${Math.round(gameHeight * 0.1)}px "Segoe UI", Arial, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.fillText('ПАУЗА', gameWidth / 2, gameHeight / 2);
                    ctx.textAlign = 'start';
                }
            }

            // ==================== ИГРОВОЙ ЦИКЛ ====================
            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            // ==================== ОБРАБОТЧИКИ СОБЫТИЙ ====================
            // Клавиатура
            window.addEventListener('keydown', (e) => {
                keys[e.key] = true;

                if (e.key === ' ' || e.code === 'Space') {
                    e.preventDefault();
                    if (!gameOver) {
                        initAudio();
                        togglePause();
                    }
                }

                if (e.key === 'r' || e.key === 'R') {
                    e.preventDefault();
                    initAudio();
                    detectMobile();
                    resize();
                    resetGame();
                }

                if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                    e.preventDefault();
                }
            });

            window.addEventListener('keyup', (e) => {
                keys[e.key] = false;
            });

            // Тач-управление на canvas
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                initAudio();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                const touchCanvasX = touch.clientX - rect.left;
                // Только левая половина
                if (touchCanvasX < gameWidth / 2) {
                    touchActive = true;
                    touchY = touch.clientY - rect.top;
                    playerY = clamp(touchY - paddleHeight / 2, 0, gameHeight - paddleHeight);
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (touchActive) {
                    const rect = canvas.getBoundingClientRect();
                    touchY = e.touches[0].clientY - rect.top;
                    playerY = clamp(touchY - paddleHeight / 2, 0, gameHeight - paddleHeight);
                }
            }, { passive: false });

            canvas.addEventListener('touchend', (e) => {
                e.preventDefault();
                touchActive = false;
            }, { passive: false });

            // ==================== МОБИЛЬНЫЕ КНОПКИ ====================
            function addMobileButtonListeners(btn, setPressed) {
                // Touch-события
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    initAudio();
                    setPressed(true);
                }, { passive: false });

                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    setPressed(false);
                }, { passive: false });

                btn.addEventListener('touchcancel', (e) => {
                    e.preventDefault();
                    setPressed(false);
                }, { passive: false });

                // Мышь (для тестирования на десктопе, если кнопки видны)
                btn.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    initAudio();
                    setPressed(true);
                });

                btn.addEventListener('mouseup', (e) => {
                    e.preventDefault();
                    setPressed(false);
                });

                btn.addEventListener('mouseleave', (e) => {
                    setPressed(false);
                });
            }

            addMobileButtonListeners(btnUp, (pressed) => { btnUpPressed = pressed; });
            addMobileButtonListeners(btnDown, (pressed) => { btnDownPressed = pressed; });

            // Кнопка паузы
            pauseBtn.addEventListener('click', () => {
                initAudio();
                togglePause();
            });

            // Кнопка рестарта
            restartBtn.addEventListener('click', () => {
                initAudio();
                detectMobile();
                resize();
                resetGame();
            });

            function togglePause() {
                if (gameOver) return;
                paused = !paused;
                pauseBtn.textContent = paused ? '▶ ПРОДОЛЖИТЬ' : '⏯ ПАУЗА';
                if (paused) {
                    messageEl.textContent = 'Игра на паузе';
                } else if (isMobile) {
                    messageEl.textContent = 'Кнопки ▼▲ или касание левой половины';
                } else {
                    messageEl.textContent = 'Стрелки ↑↓ / Пробел — пауза | R — рестарт';
                }
            }

            // Ресайз окна
            let resizeTimeout;
            window.addEventListener('resize', () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    detectMobile();
                    resize();
                }, 200);
            });

            // Обработчик изменения ориентации (мобильные)
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    detectMobile();
                    resize();
                }, 300);
            });

            // Инициализация аудио при первом взаимодействии
            document.addEventListener('click', initAudio, { once: true });
            document.addEventListener('touchstart', initAudio, { once: true });

            // ==================== ЗАПУСК ====================
            detectMobile();
            resize();
            resetGame();
            gameLoop();

            console.log('🏓 Пинг-понг готов!');
            console.log('📱 Мобильный режим:', isMobile ? 'ДА' : 'НЕТ');
            console.log('🎮 Управление:', isMobile ? 'кнопки ВВЕРХ/ВНИЗ + касание левой половины' :
                'стрелки ↑↓');
            console.log('📏 Размер мяча:', ballSize + 'px', '| Ракетка:', paddleHeight + 'px');
        })();
    </script>
</body>
</html>
